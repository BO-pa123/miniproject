<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {font-family: Arial, Helvetica, sans-serif;}
form {
border: 3px solid #f1f1f1;
background-color:white;
}

input[type=text], input[type=password] {
  width: 100%;
  padding: 12px 20px;
  margin: 8px 0;
  display: inline-block;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

button {
  background-color: #04AA6D;
  color: white;
  padding: 14px 20px;
  margin: 8px 0;
  border: none;
  cursor: pointer;
  width: 100%;
}

button:hover {
  opacity: 0.8;
}

.cancelbtn {
  width: auto;
  padding: 10px 18px;
  background-color: #f44336;
}
.bg-con{
  height:40%;
  width:40%;
  margin-left:30%;
  margin-top:10%;
  border:15px bold;
}

.imgcontainer {
  text-align: center;
  margin: 24px 0 12px 0;
  position:relative;
}

img.logo {
  width: 20%;
  border-radius: 5%;
}

.container {
  padding: 16px;
}

span.psw {
  float: right;
  padding-top: 16px;
}

/* Change styles for span and cancel button on extra small screens */
@media screen and (max-width: 300px) {
  span.psw {
     display: block;
     float: none;
  }
  .cancelbtn {
     width: 100%;
  }
}
body{
    background-image:url("land.jpg");
    background-repeat: no-repeat;
    background-attachment: fixed;
    background-size: cover;
}
</style>
</head>
<body>
<div class="bg-con">
<form action="/action_page.php" method="post">
  <div class="imgcontainer">
    <img src="https://image3.mouthshut.com/images/imagesp/925716682s.jpg" alt="Logo" class="logo">
  </div>

  <div class="container">
    <label for="uname"><b>Username</b></label>
    <input type="text" placeholder="Enter Username" name="uname" required>

    <label for="psw"><b>Password</b></label>
    <input type="password" id="passwordInput" placeholder="Enter Password" required>
        
    <button type="submit" onclick="checkPassword()">Login</button>
    <label>
      <input type="checkbox" checked="checked" name="remember"> Remember me
    </label>
  </div>

  <div class="container" style="background-color:#f1f1f1">
    <button type="button" class="cancelbtn">Cancel</button>
    <span class="psw">Forgot <a href="#">password?</a></span>
  </div>
</form>
</div>
<script>
const correctPassword = "vvit@123";

        // Function to check the entered password
        function checkPassword() {
            const enteredPassword = document.getElementById("passwordInput").value;
            if (enteredPassword === correctPassword) {
                openNewWindow();
            } else {
                alert("Incorrect password. Please try again.");
            }
        }
      function openNewWindow() {
            window.open("AdminPage.html"); // Replace with the URL you want to open
 }
</script>
</body>
</html>
